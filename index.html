<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Latch — Verification Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#F6F7F5;
    --panel:#FFFFFF;
    --panel-2:#F1F2EF;
    --line:#E1E4DF;
    --line-soft:#EAECE8;
    --ink:#14181A;
    --ink-dim:#5C6560;
    --ink-faint:#8D958F;
    --accent:#0F6E5C;        /* seal teal — the one accent, echoes a wax-seal stamp */
    --accent-soft:#E4F1EC;
    --accent-ink:#F5FBF8;
    --warn:#8A5A0B;
    --warn-soft:#FBF1DE;
    --danger:#A83A32;
    --danger-soft:#FBEAE8;
    --info:#2A5AA8;
    --info-soft:#EAF0FB;
    --radius:10px;
    --mono:'IBM Plex Mono',ui-monospace,monospace;
    --display:'Space Grotesk',sans-serif;
    --body:'Inter',sans-serif;
    --shadow-sm:0 1px 2px rgba(20,24,26,.04), 0 1px 1px rgba(20,24,26,.03);
    --shadow-md:0 8px 24px rgba(20,24,26,.08), 0 2px 6px rgba(20,24,26,.05);
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--body);-webkit-font-smoothing:antialiased;}
  ::selection{background:var(--accent-soft);color:var(--accent);}
  @media (prefers-reduced-motion: reduce){ *{animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important; } }

  /* ---------- Logo mark: an abstract barn-door latch — bolt slides home on load ---------- */
  .logo{display:flex;align-items:center;gap:9px;}
  .logo svg{flex:none;}
  .logo-bolt{transform-origin:8px 20px;animation:boltHome .55s cubic-bezier(.2,.8,.2,1) both;animation-delay:.15s;}
  @keyframes boltHome{from{transform:translateX(-7px);opacity:0;}to{transform:translateX(0);opacity:1;}}
  .logo span{font-family:var(--display);font-weight:700;font-size:17px;letter-spacing:.2px;color:var(--ink);}

  /* ---------- Shell ---------- */
  #app{display:none;min-height:100vh;grid-template-columns:220px 1fr;}
  #app.ready{display:grid;}

  .side{border-right:1px solid var(--line);padding:24px 18px;display:flex;flex-direction:column;gap:28px;background:var(--panel);}
  .side nav{display:flex;flex-direction:column;gap:2px;}
  .side nav button{all:unset;cursor:pointer;padding:9px 10px;border-radius:8px;font-size:13.5px;color:var(--ink-dim);display:flex;justify-content:space-between;align-items:center;}
  .side nav button:hover{background:var(--panel-2);color:var(--ink);}
  .side nav button.active{background:var(--accent-soft);color:var(--accent);}
  .side nav button .count{font-family:var(--mono);font-size:11px;color:var(--ink-faint);}
  .side nav button.active .count{color:var(--accent);}
  .side-foot{margin-top:auto;font-size:12px;color:var(--ink-faint);display:flex;flex-direction:column;gap:8px;}
  .side-foot button{all:unset;cursor:pointer;color:var(--ink-faint);font-size:12px;}
  .side-foot button:hover{color:var(--ink-dim);}

  main{padding:28px 34px;overflow-y:auto;height:100vh;}
  .topbar{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px;gap:16px;}
  .topbar h1{font-family:var(--display);font-size:21px;margin:0 0 4px;color:var(--ink);}
  .topbar p{margin:0;color:var(--ink-dim);font-size:13px;}
  .btn{all:unset;cursor:pointer;font-size:13px;font-weight:600;padding:10px 16px;border-radius:8px;font-family:var(--body);}
  .btn-primary{background:var(--accent);color:#F5FBF8;}
  .btn-primary:hover{background:#0C5A4B;}
  .btn-ghost{border:1px solid var(--line);color:var(--ink-dim);background:var(--panel);}
  .btn-ghost:hover{color:var(--ink);border-color:#C9CEC8;}

  /* ---------- Table ---------- */
  .table-wrap{border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:var(--panel);box-shadow:var(--shadow-sm);}
  table{width:100%;border-collapse:collapse;}
  thead th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-faint);font-weight:600;padding:12px 16px;border-bottom:1px solid var(--line);background:var(--panel-2);}
  tbody td{padding:13px 16px;border-bottom:1px solid var(--line-soft);font-size:13.5px;vertical-align:middle;}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr{cursor:pointer;}
  tbody tr:hover td{background:var(--panel-2);}
  .cell-name{font-weight:500;}
  .cell-sub{color:var(--ink-faint);font-size:12px;margin-top:2px;}
  .mono{font-family:var(--mono);font-size:12.5px;color:var(--ink-dim);}
  .empty{padding:60px 20px;text-align:center;color:var(--ink-faint);font-size:13.5px;}

  /* status chip — stamped, not decorated */
  .chip{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:4px 8px;border-radius:5px;border:1px solid transparent;}
  .chip::before{content:'';width:6px;height:6px;border-radius:50%;}
  .chip.approved{color:var(--accent);border-color:#BFE0D5;background:var(--accent-soft);}
  .chip.approved::before{background:var(--accent);}
  .chip.declined{color:var(--danger);border-color:#EBC6C2;background:var(--danger-soft);}
  .chip.declined::before{background:var(--danger);}
  .chip.review{color:var(--warn);border-color:#EAD6A8;background:var(--warn-soft);}
  .chip.review::before{background:var(--warn);}
  .chip.progress{color:var(--info);border-color:#C4D3ED;background:var(--info-soft);}
  .chip.progress::before{background:var(--info);}
  .chip.other{color:var(--ink-faint);border-color:var(--line);background:var(--panel-2);}
  .chip.other::before{background:var(--ink-faint);}

  /* ---------- Detail panel ---------- */
  .scrim{position:fixed;inset:0;background:rgba(20,24,22,.28);opacity:0;pointer-events:none;transition:opacity .18s;z-index:20;}
  .scrim.open{opacity:1;pointer-events:auto;}
  .panel{position:fixed;top:0;right:0;height:100vh;width:420px;max-width:92vw;background:var(--panel);border-left:1px solid var(--line);transform:translateX(100%);transition:transform .22s ease;z-index:21;overflow-y:auto;padding:26px;box-shadow:var(--shadow-md);}
  .panel.open{transform:translateX(0);}
  .panel h2{font-family:var(--display);font-size:18px;margin:0 0 2px;color:var(--ink);}
  .panel .sub{color:var(--ink-faint);font-size:12px;font-family:var(--mono);margin-bottom:20px;}
  .panel-close{all:unset;cursor:pointer;color:var(--ink-faint);float:right;font-size:13px;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-faint);margin-bottom:5px;}
  .field .val{font-size:13.5px;}
  .field .val.mono{font-size:12.5px;}
  .decision-block{background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:12px;font-family:var(--mono);font-size:11.5px;color:var(--ink-dim);white-space:pre-wrap;word-break:break-word;max-height:280px;overflow-y:auto;}
  .panel-actions{display:flex;gap:8px;margin-top:20px;}

  /* ---------- New session modal ---------- */
  .modal-scrim{position:fixed;inset:0;background:rgba(20,24,22,.32);display:none;align-items:center;justify-content:center;z-index:30;}
  .modal-scrim.open{display:flex;}
  .modal{width:420px;max-width:92vw;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:24px;box-shadow:var(--shadow-md);}
  .modal h3{font-family:var(--display);font-size:16px;margin:0 0 18px;color:var(--ink);}
  .modal input{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:7px;padding:10px 12px;color:var(--ink);font-size:13.5px;font-family:var(--body);margin-bottom:12px;}
  .modal input:focus{outline:none;border-color:var(--accent);}
  .modal-foot{display:flex;justify-content:flex-end;gap:8px;margin-top:6px;}
  .modal-error{color:var(--danger);font-size:12.5px;margin:-4px 0 12px;}

  /* ---------- Login ---------- */
  #login{min-height:100vh;display:flex;align-items:center;justify-content:center;}
  .login-card{width:340px;padding:30px;border:1px solid var(--line);border-radius:12px;background:var(--panel);box-shadow:var(--shadow-md);}
  .login-card .logo{margin-bottom:22px;}
  .login-card input{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:7px;padding:11px 12px;color:var(--ink);font-size:13.5px;margin-bottom:12px;}
  .login-card input:focus{outline:none;border-color:var(--accent);}
  .login-card .btn-primary{width:100%;text-align:center;margin-top:4px;}
  .login-error{color:var(--danger);font-size:12.5px;margin:-4px 0 12px;min-height:1em;}
</style>
</head>
<body>

<!-- Shared logo mark: reused via innerHTML injection so all three placements stay in sync -->
<template id="logoTemplate">
  <span class="logo">
    <svg width="26" height="26" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="3.5" y="3.5" width="33" height="33" rx="10" stroke="#14181A" stroke-width="2.25"/>
      <path d="M27 12v16" stroke="#14181A" stroke-width="2.25" stroke-linecap="round"/>
      <path d="M27 14.5c2.8 0 4.5 1.6 4.5 5.5s-1.7 5.5-4.5 5.5" stroke="#14181A" stroke-width="2.25" stroke-linecap="round" fill="none"/>
      <rect class="logo-bolt" x="7" y="17" width="18" height="6" rx="3" fill="#0F6E5C"/>
    </svg>
    <span>Latch</span>
  </span>
</template>

<!-- ============== LOGIN ============== -->
<div id="login">
  <div class="login-card">
    <div class="logo" id="logoLogin"></div>
    <div class="login-error" id="loginError"></div>
    <input type="email" id="loginEmail" placeholder="Admin email" autocomplete="username" />
    <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password" />
    <button class="btn btn-primary" id="loginBtn">Sign in</button>
  </div>
</div>

<!-- ============== APP ============== -->
<div id="app">
  <aside class="side">
    <div class="logo" id="logoSide"></div>
    <nav id="statusNav">
      <button data-filter="all" class="active">All sessions <span class="count" id="count-all">0</span></button>
      <button data-filter="In Review">In review <span class="count" id="count-review">0</span></button>
      <button data-filter="In Progress">In progress <span class="count" id="count-progress">0</span></button>
      <button data-filter="Approved">Approved <span class="count" id="count-approved">0</span></button>
      <button data-filter="Declined">Declined <span class="count" id="count-declined">0</span></button>
      <button data-filter="Not Started">Not started <span class="count" id="count-notstarted">0</span></button>
    </nav>
    <div class="side-foot">
      <span id="whoami"></span>
      <button id="signOutBtn">Sign out</button>
    </div>
  </aside>

  <main>
    <div class="topbar">
      <div>
        <h1>Verification sessions</h1>
        <p>Live status from Didit — updates the moment a webhook lands.</p>
      </div>
      <button class="btn btn-primary" id="newSessionBtn">+ New verification</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:26%">Applicant</th>
            <th style="width:20%">ID number</th>
            <th style="width:16%">Status</th>
            <th style="width:20%">Session</th>
            <th style="width:18%">Updated</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
      <div class="empty" id="emptyState" style="display:none;">No sessions yet — start one with "New verification".</div>
    </div>
  </main>
</div>

<!-- ============== DETAIL PANEL ============== -->
<div class="scrim" id="scrim"></div>
<div class="panel" id="panel">
  <button class="panel-close" id="panelClose">Close ✕</button>
  <h2 id="pName">—</h2>
  <div class="sub" id="pSession">—</div>

  <div class="field"><label>Status</label><div class="val" id="pStatus">—</div></div>
  <div class="field"><label>ID number</label><div class="val mono" id="pIdNumber">—</div></div>
  <div class="field"><label>Email</label><div class="val" id="pEmail">—</div></div>
  <div class="field"><label>Created</label><div class="val mono" id="pCreated">—</div></div>
  <div class="field"><label>Last updated</label><div class="val mono" id="pUpdated">—</div></div>
  <div class="field">
    <label>Decision payload</label>
    <div class="decision-block" id="pDecision">No decision yet.</div>
  </div>

  <div class="panel-actions">
    <button class="btn btn-ghost" id="refreshBtn">Check now</button>
    <button class="btn btn-ghost" id="copyLinkBtn">Copy verification link</button>
  </div>
</div>

<!-- ============== NEW SESSION MODAL ============== -->
<div class="modal-scrim" id="modalScrim">
  <div class="modal">
    <h3>Start a verification</h3>
    <div class="modal-error" id="modalError"></div>
    <input id="newName" placeholder="Full name" />
    <input id="newEmail" placeholder="Email (optional — sends the link automatically)" />
    <input id="newIdNumber" placeholder="ID number" />
    <div class="modal-foot">
      <button class="btn btn-ghost" id="modalCancel">Cancel</button>
      <button class="btn btn-primary" id="modalCreate">Create session</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import {
  getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
import {
  getFirestore, collection, doc, getDoc, onSnapshot, query, orderBy
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";
import {
  getFunctions, httpsCallable
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-functions.js";

// Stamp the shared logo markup into each placement.
const logoTpl = document.getElementById("logoTemplate");
["logoLogin", "logoSide"].forEach((id) => {
  document.getElementById(id).replaceWith(logoTpl.content.cloneNode(true));
});

// ---- Fill in with your Firebase project config ----
const firebaseConfig = {
  apiKey: "AIzaSyBQSPwpVbGrdCuOoyitAeWQHIeipj2MgIY",
  authDomain: "newstart-64c43.firebaseapp.com",
  databaseURL: "https://newstart-64c43-default-rtdb.firebaseio.com",
  projectId: "newstart-64c43",
  storageBucket: "newstart-64c43.firebasestorage.app",
  messagingSenderId: "941619830061",
  appId: "1:941619830061:web:de9e0f791eb8f6eacf87a4",
  measurementId: "G-7064P2RFHN",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const functions = getFunctions(app);

const createVerificationSession = httpsCallable(functions, "createVerificationSession");
const refreshSessionDecision = httpsCallable(functions, "refreshSessionDecision");

let sessions = [];
let activeFilter = "all";
let unsubscribe = null;

// ---------------- Auth ----------------
document.getElementById("loginBtn").onclick = async () => {
  const email = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("loginPassword").value;
  const errEl = document.getElementById("loginError");
  errEl.textContent = "";
  try {
    await signInWithEmailAndPassword(auth, email, password);
  } catch (e) {
    errEl.textContent = "Couldn't sign in — check the email and password.";
  }
};

document.getElementById("signOutBtn").onclick = () => signOut(auth);

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    document.getElementById("login").style.display = "flex";
    document.getElementById("app").classList.remove("ready");
    if (unsubscribe) unsubscribe();
    return;
  }
  const adminSnap = await getDoc(doc(db, "admins", user.uid));
  if (!adminSnap.exists()) {
    document.getElementById("loginError").textContent = "This account isn't authorized for Latch.";
    await signOut(auth);
    return;
  }
  document.getElementById("login").style.display = "none";
  document.getElementById("app").classList.add("ready");
  document.getElementById("whoami").textContent = user.email;
  listenToSessions();
});

// ---------------- Live data ----------------
function listenToSessions() {
  const q = query(collection(db, "verifications"), orderBy("createdAt", "desc"));
  unsubscribe = onSnapshot(q, (snap) => {
    sessions = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
    renderCounts();
    renderRows();
  });
}

function statusClass(status) {
  if (status === "Approved") return "approved";
  if (status === "Declined") return "declined";
  if (status === "In Review") return "review";
  if (status === "In Progress") return "progress";
  return "other";
}

function fmtDate(ts) {
  if (!ts) return "—";
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleString("en-ZA", { day: "2-digit", month: "short", hour: "2-digit", minute: "2-digit" });
}

function renderCounts() {
  const counts = { all: sessions.length, review: 0, progress: 0, approved: 0, declined: 0, notstarted: 0 };
  sessions.forEach((s) => {
    if (s.status === "In Review") counts.review++;
    else if (s.status === "In Progress") counts.progress++;
    else if (s.status === "Approved") counts.approved++;
    else if (s.status === "Declined") counts.declined++;
    else if (s.status === "Not Started") counts.notstarted++;
  });
  document.getElementById("count-all").textContent = counts.all;
  document.getElementById("count-review").textContent = counts.review;
  document.getElementById("count-progress").textContent = counts.progress;
  document.getElementById("count-approved").textContent = counts.approved;
  document.getElementById("count-declined").textContent = counts.declined;
  document.getElementById("count-notstarted").textContent = counts.notstarted;
}

function renderRows() {
  const rows = document.getElementById("rows");
  const filtered = activeFilter === "all" ? sessions : sessions.filter((s) => s.status === activeFilter);
  document.getElementById("emptyState").style.display = filtered.length ? "none" : "block";
  rows.innerHTML = filtered
    .map(
      (s) => `
      <tr data-id="${s.id}">
        <td>
          <div class="cell-name">${escapeHtml(s.applicantName || "Unnamed")}</div>
          <div class="cell-sub">${escapeHtml(s.email || "no email on file")}</div>
        </td>
        <td class="mono">${escapeHtml(s.idNumberMasked || "—")}</td>
        <td><span class="chip ${statusClass(s.status)}">${escapeHtml(s.status || "unknown")}</span></td>
        <td class="mono">${s.id.slice(0, 8)}…</td>
        <td class="mono">${fmtDate(s.updatedAt)}</td>
      </tr>`
    )
    .join("");

  rows.querySelectorAll("tr").forEach((tr) => {
    tr.onclick = () => openPanel(tr.dataset.id);
  });
}

document.querySelectorAll("#statusNav button").forEach((btn) => {
  btn.onclick = () => {
    document.querySelectorAll("#statusNav button").forEach((b) => b.classList.remove("active"));
    btn.classList.add("active");
    activeFilter = btn.dataset.filter;
    renderRows();
  };
});

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

// ---------------- Detail panel ----------------
let activeSessionId = null;

function openPanel(id) {
  const s = sessions.find((x) => x.id === id);
  if (!s) return;
  activeSessionId = id;
  document.getElementById("pName").textContent = s.applicantName || "Unnamed applicant";
  document.getElementById("pSession").textContent = s.id;
  document.getElementById("pStatus").innerHTML = `<span class="chip ${statusClass(s.status)}">${escapeHtml(s.status || "unknown")}</span>`;
  document.getElementById("pIdNumber").textContent = s.idNumberMasked || "—";
  document.getElementById("pEmail").textContent = s.email || "—";
  document.getElementById("pCreated").textContent = fmtDate(s.createdAt);
  document.getElementById("pUpdated").textContent = fmtDate(s.updatedAt);
  document.getElementById("pDecision").textContent = s.decision ? JSON.stringify(s.decision, null, 2) : "No decision yet — status updates here as soon as Didit sends one.";
  document.getElementById("scrim").classList.add("open");
  document.getElementById("panel").classList.add("open");
}

function closePanel() {
  document.getElementById("scrim").classList.remove("open");
  document.getElementById("panel").classList.remove("open");
  activeSessionId = null;
}
document.getElementById("panelClose").onclick = closePanel;
document.getElementById("scrim").onclick = closePanel;

document.getElementById("refreshBtn").onclick = async () => {
  if (!activeSessionId) return;
  const btn = document.getElementById("refreshBtn");
  btn.textContent = "Checking…";
  try {
    await refreshSessionDecision({ sessionId: activeSessionId });
  } catch (e) {
    console.error(e);
  }
  btn.textContent = "Check now";
};

document.getElementById("copyLinkBtn").onclick = () => {
  const s = sessions.find((x) => x.id === activeSessionId);
  if (s?.url) navigator.clipboard.writeText(s.url);
};

// ---------------- New session modal ----------------
const modalScrim = document.getElementById("modalScrim");
document.getElementById("newSessionBtn").onclick = () => {
  document.getElementById("newName").value = "";
  document.getElementById("newEmail").value = "";
  document.getElementById("newIdNumber").value = "";
  document.getElementById("modalError").textContent = "";
  modalScrim.classList.add("open");
};
document.getElementById("modalCancel").onclick = () => modalScrim.classList.remove("open");

document.getElementById("modalCreate").onclick = async () => {
  const fullName = document.getElementById("newName").value.trim();
  const email = document.getElementById("newEmail").value.trim();
  const idNumber = document.getElementById("newIdNumber").value.trim();
  const errEl = document.getElementById("modalError");
  const btn = document.getElementById("modalCreate");

  if (!idNumber) {
    errEl.textContent = "An ID number is required.";
    return;
  }
  errEl.textContent = "";
  btn.textContent = "Creating…";
  try {
    const result = await createVerificationSession({ fullName, email: email || undefined, idNumber });
    modalScrim.classList.remove("open");
    if (result.data?.url) {
      await navigator.clipboard.writeText(result.data.url);
    }
  } catch (e) {
    errEl.textContent = e.message || "Couldn't create the session.";
  }
  btn.textContent = "Create session";
};
</script>
</body>
</html>
